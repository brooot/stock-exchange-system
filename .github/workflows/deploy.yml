name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: |
        pnpm nx test stock-back-end --passWithNoTests

    - name: Build applications
      run: |
        pnpm nx build stock-back-end
        pnpm nx build stock-fe

    - name: Deploy to server
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.PORT || 22 }}
        script: |
          cd ${{ secrets.PROJECT_PATH || '/opt/stock-exchange-system' }}

          # 停止现有服务
          docker compose -f docker-compose.prod.yml down

          # 拉取最新代码
          git pull origin main

          # 清理Docker缓存（可选）
          docker system prune -f

          # 设置Docker镜像拉取重试
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          # 构建并启动服务（带重试机制）
          for i in {1..3}; do
            echo "尝试启动服务 (第 $i 次)"
            if docker compose -f docker-compose.prod.yml up -d --build --timeout 300; then
              echo "服务启动成功"
              break
            else
              echo "第 $i 次启动失败，等待 30 秒后重试"
              docker compose -f docker-compose.prod.yml down
              sleep 30
              if [ $i -eq 3 ]; then
                echo "所有重试都失败了"
                exit 1
              fi
            fi
          done

          # 等待服务启动
          sleep 60

          # 检查服务状态
          docker compose -f docker-compose.prod.yml ps

          # 检查健康状态（带重试）
          for i in {1..3}; do
            echo "检查服务健康状态 (第 $i 次)"
            if curl -f http://localhost:3000 && curl -f http://localhost:3001/api; then
              echo "所有服务健康检查通过"
              exit 0
            else
              echo "健康检查失败，等待 10 秒后重试"
              sleep 10
            fi
          done

          echo "健康检查最终失败"
          exit 1

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
