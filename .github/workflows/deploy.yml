name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: |
        pnpm nx test stock-back-end --passWithNoTests

    - name: Build applications
      run: |
        pnpm nx build stock-back-end
        pnpm nx build stock-fe

    - name: Build and push Docker images
      if: github.ref == 'refs/heads/main'
      run: |
        # 登录镜像仓库
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

        # 构建镜像（使用不同标签区分前后端）
        docker build -f apps/stock-back-end/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-${{ github.sha }} .
        docker build -f apps/stock-fe/Dockerfile -t ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-${{ github.sha }} .

        # 同时打上latest标签
        docker tag ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-latest
        docker tag ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-latest

        # 推送镜像
        docker push ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-${{ github.sha }}
        docker push ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-${{ github.sha }}
        docker push ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-latest

    - name: Deploy to server
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.PORT || 22 }}
        script: |
          cd ${{ secrets.PROJECT_PATH || '/opt/stock-exchange-system' }}

          # 停止现有服务
          docker compose -f docker-compose.prod.yml --env-file .env.production down

          # 拉取最新代码
          git pull origin main

          # 登录镜像仓库
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          # 清理旧镜像和容器
          docker system prune -af

          # 拉取最新的预构建镜像
           echo "拉取最新镜像..."
           docker pull ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:backend-latest
           docker pull ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_NAMESPACE }}/${{ secrets.DOCKER_REPO_NAME }}:frontend-latest
           docker pull postgres:16-alpine

          # 启动服务（无需构建，直接使用预构建镜像）
          echo "启动服务..."
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d

          # 等待服务启动（增加等待时间）
          echo "等待服务完全启动..."
          sleep 120

          # 检查服务状态
          echo "检查Docker容器状态:"
          docker compose -f docker-compose.prod.yml --env-file .env.production ps

          echo "检查Docker容器日志:"
          docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=50

          # 检查健康状态（带重试，增加重试次数和等待时间）
          for i in {1..6}; do
            echo "检查服务健康状态 (第 $i 次)"

            # 检查前端服务
            if curl -f -m 30 http://localhost:3000 >/dev/null 2>&1; then
              echo "✅ 前端服务健康检查通过"
              frontend_ok=true
            else
              echo "❌ 前端服务健康检查失败"
              frontend_ok=false
            fi

            # 检查后端服务
            if curl -f -m 30 http://localhost:3001/api >/dev/null 2>&1; then
              echo "✅ 后端服务健康检查通过"
              backend_ok=true
            else
              echo "❌ 后端服务健康检查失败"
              backend_ok=false
            fi

            if [ "$frontend_ok" = true ] && [ "$backend_ok" = true ]; then
              echo "🎉 所有服务健康检查通过"
              exit 0
            else
              echo "健康检查失败，等待 30 秒后重试"
              if [ $i -lt 6 ]; then
                sleep 30
              fi
            fi
          done

          echo "❌ 健康检查最终失败"
          echo "输出最终的容器状态和日志:"
          docker compose -f docker-compose.prod.yml --env-file .env.production ps
          docker compose -f docker-compose.prod.yml --env-file .env.production logs
          exit 1

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
