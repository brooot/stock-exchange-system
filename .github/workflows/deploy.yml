name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: |
        pnpm nx test stock-back-end --passWithNoTests

    - name: Build applications
      run: |
        pnpm nx build stock-back-end
        pnpm nx build stock-fe

    - name: Deploy to server
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: ${{ secrets.PORT || 22 }}
        script: |
          cd ${{ secrets.PROJECT_PATH || '/opt/stock-exchange-system' }}

          # 停止现有服务
          docker compose -f docker-compose.prod.yml down

          # 拉取最新代码
          git pull origin main

          # 清理Docker缓存（可选）
          docker system prune -f

          # 设置Docker镜像拉取重试和超时配置
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          export DOCKER_CLIENT_TIMEOUT=600
          export COMPOSE_HTTP_TIMEOUT=600

          # 预拉取基础镜像以避免构建时超时
          echo "预拉取基础镜像..."
          docker pull postgres:16-alpine || echo "postgres镜像拉取失败，将在构建时重试"
          docker pull node:22.17.0-alpine || echo "node镜像拉取失败，将在构建时重试"

          # 构建并启动服务（带重试机制）
          for i in {1..5}; do
            echo "尝试启动服务 (第 $i 次)"
            if timeout 900 docker compose -f docker-compose.prod.yml up -d --build; then
              echo "服务启动成功"
              break
            else
              echo "第 $i 次启动失败，等待 60 秒后重试"
              docker compose -f docker-compose.prod.yml down || true
              docker system prune -f || true
              sleep 60
              if [ $i -eq 5 ]; then
                echo "所有重试都失败了"
                # 输出详细的错误信息
                docker compose -f docker-compose.prod.yml logs || true
                exit 1
              fi
            fi
          done

          # 等待服务启动（增加等待时间）
          echo "等待服务完全启动..."
          sleep 120

          # 检查服务状态
          echo "检查Docker容器状态:"
          docker compose -f docker-compose.prod.yml ps
          
          echo "检查Docker容器日志:"
          docker compose -f docker-compose.prod.yml logs --tail=50

          # 检查健康状态（带重试，增加重试次数和等待时间）
          for i in {1..6}; do
            echo "检查服务健康状态 (第 $i 次)"
            
            # 检查前端服务
            if curl -f -m 30 http://localhost:3000 >/dev/null 2>&1; then
              echo "✅ 前端服务健康检查通过"
              frontend_ok=true
            else
              echo "❌ 前端服务健康检查失败"
              frontend_ok=false
            fi
            
            # 检查后端服务
            if curl -f -m 30 http://localhost:3001/api >/dev/null 2>&1; then
              echo "✅ 后端服务健康检查通过"
              backend_ok=true
            else
              echo "❌ 后端服务健康检查失败"
              backend_ok=false
            fi
            
            if [ "$frontend_ok" = true ] && [ "$backend_ok" = true ]; then
              echo "🎉 所有服务健康检查通过"
              exit 0
            else
              echo "健康检查失败，等待 30 秒后重试"
              if [ $i -lt 6 ]; then
                sleep 30
              fi
            fi
          done

          echo "❌ 健康检查最终失败"
          echo "输出最终的容器状态和日志:"
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs
          exit 1

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
