services:
  # PostgreSQL数据库服务（保持不变）
  postgres:
    image: postgres:16-alpine
    container_name: stock-postgres
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - stock-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d stock_db']
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端服务
  stock-back-end:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/${DOCKER_REPO_NAME}:backend-latest
    platform: linux/amd64
    container_name: stock-back-end
    # 限制运行时资源使用（针对2核2G服务器优化）
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 400M
        reservations:
          cpus: '0.3'
          memory: 200M
    env_file:
      - .env.production
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SYNC=${DATABASE_SYNC:-false}
      - DATABASE_URL=postgresql://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${DATABASE_NAME}?schema=public
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-network

  # 前端服务
  stock-fe:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/${DOCKER_REPO_NAME}:frontend-latest
    platform: linux/amd64
    container_name: stock-fe
    # 限制运行时资源使用（针对2核2G服务器优化）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 600M
        reservations:
          cpus: '0.4'
          memory: 300M
    env_file:
    - .env.production
    ports:
      - '3000:3000'
    depends_on:
      - stock-back-end
    networks:
      - stock-network
    restart: unless-stopped

networks:
  stock-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
